<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel-Financeiro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="src/css/base.css">
    <link rel="stylesheet" href="src/css/index.css">
</head>
<body>
    <main>
        
        <div class="div_filtro">
            <div class="ano">
                <label>Ano:</label>
                <input type="number" name="ano" id="ano" min="1900" max="2100" >
            </div>
            
            <div class="mes">
                <label>Mes:</label>
                <select name="mes" id="mes">
                    <option value="--" disabled selected hidden>Selecione um mes</option>
                    <option value="">Todos os mesês</option>
                    <option value="Janeiro">Janeiro</option>
                    <option value="Fevereiro">Fevereiro</option>
                    <option value="Marco">Março</option>
                    <option value="Abril">Abril</option>
                    <option value="Maio">Maio</option>
                    <option value="Junho">Junho</option>
                    <option value="Julho">Julho</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Setembro">Setembro</option>
                    <option value="Outubro">Outubro</option>
                    <option value="Novembro">Novembro</option>
                    <option value="Dezembro">Dezembro</option>
                </select>
            </div>
        
            <button id="btn_filtro">Filtrar</button>
        </div>

        <div class="div_dados">
            <div class="valor">
                <label>Valor:</label>
                <input type="number" name="valor" id="valor" placeholder="Digite o Valor R$">
            </div>
            
            <div class="tipo">
                <label>Tipo:</label>
                <select name="tipo_valor" id="tipo_valor">
                    <option value="" disabled selected hidden>Selecione uma opção</option>
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saida</option>
                </select>
            </div>

            <div id="div_descricao" class="descricao">
                <p>Descrição:</p>
                <select name="descricao" id="descricao">
                    <option value="" disabled selected hidden>Selecione uma opção</option>
                    <option value="1">Moradia</option>
                    <option value="2">Contas</option>
                    <option value="3">Alimentação</option>
                    <option value="4">Transporte</option>
                    <option value="5">Cartão</option>
                    <option value="6">Lazer</option>
                    <option value="7">Saúde</option>
                    <option value="8">Educação</option>
                    <option value="9">Dívidas</option>
                    <option value="10">Roupas</option>
                    <option value="11">Viagem</option>
                    <option value="12">Outros</option>
                </select>
            </div>
            <button id="btn_incluir">Incluir</button>
        </div>

        
        <div class="mini_dashboard">

            <div class="div_tabela">
                <table>
                    <thead>
                        <th class="coluna_ano">Mês</th>
                        <th class="coluna_mes">Ano</th>
                        <th class="coluna_valor">Valor</th>
                        <th class="coluna_tipo">Tipo</th>
                        <th class="coluna_descricao">Descrição</th>
                        <th class="coluna_acao"></th>
                    </thead>
                    <tbody id="dados_tabela"></tbody>
                </table>            
            </div>

            <div class="irformacoes">
                <div class="info_grafico">
                    <div class="grafico_circular" id="grafico_circular">
                        <div class="centro_circulo">
                            <p>Saldo</p>
                            <span class="resultado" id="resultado"></span>
                        </div>
                    </div>
                    <div class="legenda">
                        <div class="legenda entrada">
                            <div class="cor_entrada"></div>
                            <p>Entradas</p>
                        </div>
                        <div class="legenda saida">
                            <div class="cor_saida"></div>
                            <p>Saidas</p>
                        </div>
                    </div>
                </div>
                <div class="mostrar_valores">
                    <div>
                        Entradas:
                        <span id="valor_entrada">R$ 0.00</span>
                    </div>
                    <div>
                        Saidas:
                        <span id="valor_saida">R$ 0.00</span>
                    </div>
                </div>
            </div>
        </div>
        
    </main>

    <script src="src/js/index.js"></script>
</body>
</html>
